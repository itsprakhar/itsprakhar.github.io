<header class="masthead">
  <div class="wrap">
    <div class="masthead__inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand__mark" aria-hidden="true"></span>
        <span class="brand__name">prakhar thakur</span>
      </a>
      <nav>
        <ul class="nav">
          <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Writing</a></li>
          <li><a href="{{ '/categories/' | relative_url }}"{% if page.url contains 'categories' %} aria-current="page"{% endif %}>Topics</a></li>
          <li><a href="{{ '/about/' | relative_url }}"{% if page.url contains 'about' %} aria-current="page"{% endif %}>About</a></li>
          <li><a href="{{ '/feed.xml' | relative_url }}">RSS</a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>
